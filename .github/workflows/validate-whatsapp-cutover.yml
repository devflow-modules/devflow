name: Validate WhatsApp cutover

on:
  push:
    branches:
      - main
    paths:
      - "scripts/ops/validate-whatsapp-cutover.sh"
      - "src/middleware.ts"
      - "packages/whatsapp-routes/**"
      - ".github/workflows/validate-whatsapp-cutover.yml"
      - ".github/workflows/validate-whatsapp-cutover-reusable.yml"
  workflow_dispatch:
    inputs:
      portal_url:
        description: URL base do portal (vazio em push → default no script)
        type: string
        default: "https://devflowlabs.com.br"
      whatsapp_app_url:
        description: URL base do app WhatsApp
        type: string
        default: "https://whatsapp.devflowlabs.com.br"
      strict_mode:
        description: 1 = falhar se latência acima do limite
        type: string
        default: "0"

concurrency:
  group: validate-whatsapp-cutover-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    uses: ./.github/workflows/validate-whatsapp-cutover-reusable.yml
    with:
      # workflow_dispatch preenche github.event.inputs; em push fica vazio → o script usa defaults.
      portal_url: ${{ github.event.inputs.portal_url || '' }}
      whatsapp_app_url: ${{ github.event.inputs.whatsapp_app_url || '' }}
      strict_mode: ${{ github.event.inputs.strict_mode || '0' }}
    secrets: inherit
