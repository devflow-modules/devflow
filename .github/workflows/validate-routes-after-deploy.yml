# Validação contra URLs reais após deploy (smoke de edge routing).
# Não substitui o gate de governança em PR (routing-governance-check.yml).
#
# URLs: GitHub → Settings → Secrets and variables → Actions → Variables (repo):
#   ROUTE_VALIDATE_BASE_URL, ROUTE_VALIDATE_FINANCEIRO_APP_URL, ROUTE_VALIDATE_SKIP_FINANCEIRO_DEMO
# Implementação: vars.* no workflow reutilizável (sem REST API). Ver validate-routes-after-deploy-reusable.yml.
#
# Gate “deploy limpo”: STRICT_MODE=true + exit 0 do script.
name: Validate routes (post-deploy)

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "URL base do portal (vazio = vars ou default)"
        required: false
        type: string
        default: ""
      financeiro_app_url:
        description: "URL do app Financeiro (vazio = vars ou default)"
        required: false
        type: string
        default: ""
      strict_mode:
        description: "STRICT_MODE (recomendado em produção)"
        required: false
        type: boolean
        default: true
      trace_redirects:
        description: "TRACE_REDIRECTS (debug hop-a-hop nos logs)"
        required: false
        type: boolean
        default: false
  push:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: validate-routes-post-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-routes:
    uses: ./.github/workflows/validate-routes-after-deploy-reusable.yml
    with:
      input_base_url: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.base_url || '' }}
      input_financeiro_url: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.financeiro_app_url || '' }}
      input_strict: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.strict_mode || true }}
      input_trace: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.trace_redirects || false }}
