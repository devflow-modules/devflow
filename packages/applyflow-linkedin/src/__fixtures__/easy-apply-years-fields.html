<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Fixture — years of experience</title>
  </head>
  <body>
    <div role="dialog" class="jobs-easy-apply-modal">
      <form class="jobs-easy-apply-form">
        <div class="jobs-easy-apply-form-element">
          <label for="af-react-years-en">How many years of experience do you have with React?</label>
          <input id="af-react-years-en" type="number" min="0" max="60" />
        </div>
        <div class="jobs-easy-apply-form-element">
          <div class="jobs-easy-apply-form-element__label">
            <span class="text-body-small">Há quantos anos você tem de experiência com React?</span>
          </div>
          <input type="number" min="0" />
        </div>
        <div class="jobs-easy-apply-form-element">
          <div class="jobs-easy-apply-form-element__label-text">
            <span class="text-body-medium">Há quantos anos você usa Next.js?</span>
          </div>
          <select name="years-next">
            <option value="">Select an option</option>
            <option value="2">2</option>
          </select>
        </div>
        <div class="jobs-easy-apply-form-element" style="display: none">
          <label for="af-cobol">Years of experience with COBOL</label>
          <input id="af-cobol" type="number" />
        </div>
      </form>
    </div>
  </body>
</html>
