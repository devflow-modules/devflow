<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Fixture — Yes / No radios</title>
  </head>
  <body>
    <div role="dialog" class="jobs-easy-apply-modal">
      <fieldset class="jobs-easy-apply-form-element fb-dash-form-element">
        <legend>Are you willing to relocate?</legend>
        <label><input type="radio" name="af-reloc" value="yes" /> Yes</label>
        <label><input type="radio" name="af-reloc" value="no" /> No</label>
      </fieldset>
      <div class="jobs-easy-apply-form-element">
        <div class="fb-dash-form-element__label">
          <span class="text-body-small">Você tem autorização de trabalho neste país?</span>
        </div>
        <label><input type="radio" name="af-work-auth" value="yes" /> Sim</label>
        <label><input type="radio" name="af-work-auth" value="no" /> Não</label>
      </div>
    </div>
  </body>
</html>
